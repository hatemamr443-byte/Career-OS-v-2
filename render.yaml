# ─────────────────────────────────────────────────────────────
# Career OS — Render Blueprint (render.yaml)
# Deploys: FastAPI backend + React static frontend
# Docs: https://render.com/docs/blueprint-spec
# ─────────────────────────────────────────────────────────────

services:

  # ── Backend ── FastAPI / Uvicorn ──────────────────────────
  - type: web
    name: career-os-backend
    runtime: python
    rootDir: backend
    buildCommand: >-
      pip install
      --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
      -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    # Readiness probe (deeper check with DB + LLM): GET /health/ready
    envVars:
      # ── Database ──
      - key: MONGO_URL
        sync: false          # Set manually in Render Dashboard
      - key: DB_NAME
        value: career_os
      # ── CORS (set to your frontend URL after first deploy) ──
      - key: CORS_ORIGINS
        sync: false
      # ── LLM ──
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # ── App ──
      - key: ENVIRONMENT
        value: production
      - key: CRON_TOKEN
        generateValue: true
      # ── Monitoring ──
      - key: SENTRY_DSN
        sync: false
      # ── Payments ──
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # ── Email ──
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Career OS <noreply@career-os.io>
      # ── Job Sources ──
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_API_KEY
        sync: false
      - key: JOOBLE_API_KEY
        sync: false

  # ── Frontend ── React Static Site ─────────────────────────
  - type: web
    name: career-os-frontend
    runtime: static
    rootDir: frontend
    buildCommand: yarn install && yarn build
    staticPublishPath: build
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false          # Set to backend Render URL after first deploy
      - key: WDS_SOCKET_PORT
        value: "443"
      - key: ENABLE_HEALTH_CHECK
        value: "false"
