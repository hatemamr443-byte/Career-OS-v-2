<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Career OS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      min-height: 400px;
      background: #09090b;
      color: #f4f4f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    .header {
      padding: 16px;
      border-bottom: 1px solid #27272a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 14px;
    }

    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #10B981; }

    .status-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 500;
    }
    .status-badge.connected { background: #14532d33; color: #86efac; border: 1px solid #16a34a44; }
    .status-badge.disconnected { background: #45090a33; color: #fca5a5; border: 1px solid #dc262644; }

    .body { padding: 16px; }

    /* Auth view */
    .auth-view { text-align: center; padding: 24px 0; }
    .auth-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .auth-sub { color: #71717a; font-size: 12px; margin-bottom: 20px; line-height: 1.5; }
    .btn-primary {
      width: 100%;
      padding: 10px;
      background: #f4f4f5;
      color: #09090b;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #e4e4e7; }
    .input-field {
      width: 100%;
      padding: 9px 12px;
      background: #18181b;
      border: 1px solid #3f3f46;
      border-radius: 8px;
      color: #f4f4f5;
      font-size: 12px;
      outline: none;
      margin-bottom: 8px;
    }
    .input-field:focus { border-color: #71717a; }
    .input-label { font-size: 11px; color: #71717a; margin-bottom: 4px; display: block; }
    .link-btn {
      background: none;
      border: none;
      color: #71717a;
      font-size: 11px;
      cursor: pointer;
      text-decoration: underline;
    }

    /* Dashboard view */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .stat-label { font-size: 10px; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
    .stat-value { font-size: 18px; font-weight: 700; font-family: monospace; }

    .section-title { font-size: 11px; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }

    .job-preview {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .job-preview-title { font-weight: 600; font-size: 12px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .job-preview-meta { font-size: 11px; color: #71717a; }

    .save-btn {
      width: 100%;
      padding: 10px;
      background: #18181b;
      color: #f4f4f5;
      border: 1px solid #3f3f46;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .save-btn:hover { background: #27272a; border-color: #52525b; }
    .save-btn.saved { background: #14532d; border-color: #16a34a; color: #86efac; }
    .save-btn.no-job { opacity: 0.4; cursor: not-allowed; }
    .quick-action-btn {
      background: #18181b;
      border: 1px solid #3f3f46;
      border-radius: 7px;
      color: #a1a1aa;
      font-size: 11px;
      padding: 7px 8px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      width: 100%;
    }
    .quick-action-btn:hover {
      background: #27272a;
      border-color: #52525b;
      color: #f4f4f5;
    }
    .link-btn {
      background: none; border: none;
      color: #a1a1aa; cursor: pointer;
      text-decoration: underline; font-size: 11px;
    }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid #27272a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-link { color: #52525b; font-size: 11px; text-decoration: none; }
    .footer-link:hover { color: #71717a; }
    .logout-btn { background: none; border: none; color: #52525b; font-size: 11px; cursor: pointer; }
    .logout-btn:hover { color: #71717a; }

    .error-msg { color: #fca5a5; font-size: 11px; margin-top: 4px; text-align: center; }
    .success-msg { color: #86efac; font-size: 11px; margin-top: 4px; text-align: center; }

    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-dot"></div>
    Career OS
  </div>
  <span id="status-badge" class="status-badge disconnected">Not logged in</span>
</div>

<div class="body" id="main-body">
  <!-- Filled by popup.js -->
</div>

<div class="footer">
  <a href="https://career-os-web.onrender.com" target="_blank" class="footer-link">Open dashboard ↗</a>
  <button id="logout-btn" class="logout-btn" style="display:none">Log out</button>
</div>

<script src="src/popup.js"></script>
</body>
</html>
