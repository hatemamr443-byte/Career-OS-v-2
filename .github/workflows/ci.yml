# ─────────────────────────────────────────────────────────────
# Career OS — GitHub Actions CI
# Runs on every push and PR to main
# ─────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: career_os
      EMERGENT_LLM_KEY: test-key-ci
      ENVIRONMENT: test
      CRON_TOKEN: ci-token
      TEST_SESSION_TOKEN: test_session_career_os
      REACT_APP_BACKEND_URL: http://127.0.0.1:8001
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ -r backend/requirements.txt ruff pytest pytest-asyncio

      - name: Lint (ruff)
        run: ruff check backend

      - name: Start backend
        working-directory: backend
        run: python -m uvicorn server:app --host 127.0.0.1 --port 8001

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8001/health && exit 0
            sleep 2
          done
          echo "Backend failed to start"
          exit 1

      - name: Run tests
        run: pytest -vv backend/tests --tb=short

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: http://127.0.0.1:8001
          ENABLE_HEALTH_CHECK: "false"
          CI: "true"
        run: npm run build

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block committed .env files
        run: |
          if find . -name ".env" -not -name ".env.example" \
                    -not -path "./.git/*" | grep -q .; then
            echo "❌ .env file found in commit — blocked"
            exit 1
          fi
          echo "✅ No .env files committed"

      - name: Block hardcoded secrets
        run: |
          if grep -rn "EMERGENT_LLM_KEY=sk-\|ghp_[a-zA-Z0-9]" \
              --include="*.py" --include="*.js" --include="*.jsx" \
              --include="*.ts" --include="*.tsx" \
              --exclude-dir=".git" . 2>/dev/null; then
            echo "❌ Hardcoded secret detected"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"
