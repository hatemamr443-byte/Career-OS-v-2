# ─────────────────────────────────────────────────────────────────
# Career OS — GitHub Actions CI
# Runs on every push and PR to main / develop
# ─────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Backend ───────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: career_os_test
      EMERGENT_LLM_KEY: test-key-ci
      ENVIRONMENT: test
      CRON_TOKEN: ci-token
      STRIPE_SECRET_KEY: sk_test_ci_placeholder_do_not_use
      ADMIN_TOKEN: ci-admin-token
      LOG_LEVEL: WARNING

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install \
            --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ \
            -r backend/requirements.txt \
            ruff pytest pytest-asyncio

      - name: Lint (ruff)
        # E501 = line-too-long: style preference, not a bug
        run: ruff check backend --ignore E501

      - name: Start backend (background)
        working-directory: backend
        run: |
          python -m uvicorn server:app \
            --host 127.0.0.1 --port 8001 \
            --log-level warning &
          echo $! > /tmp/uvicorn.pid

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8001/health > /dev/null 2>&1; then
              echo "✅ Backend healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "❌ Backend failed to start in 30s"
          kill $(cat /tmp/uvicorn.pid) 2>/dev/null || true
          exit 1

      - name: Run tests
        # PYTHONPATH ensures backend/ local modules (insights_service, emailer, etc.)
        # are importable when pytest collects tests from backend/tests/
        env:
          PYTHONPATH: backend
        run: pytest -vv backend/tests --tb=short -x

      - name: Stop backend
        if: always()
        run: kill $(cat /tmp/uvicorn.pid) 2>/dev/null || true

  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 24 / npm)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # package.json declares "packageManager": "npm@10.8.2"
      # package-lock.json is at frontend/package-lock.json
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: http://127.0.0.1:8001
          ENABLE_HEALTH_CHECK: "false"
          # CI=false prevents treating warnings as errors in CRA
          CI: "false"
        run: npm run build

  # ── Secrets scan ─────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Block committed .env files
        run: |
          if find . \
               -name ".env" \
               -not -name ".env.example" \
               -not -path "./.git/*" \
             | grep -q .; then
            echo "❌ .env file committed — blocked"
            exit 1
          fi
          echo "✅ No .env files committed"

      - name: Block hardcoded secrets
        run: |
          # Exclude ci.yml itself (contains the grep pattern as a string)
          if grep -rn "EMERGENT_LLM_KEY=sk-\|ghp_[A-Za-z0-9]" \
               --include="*.py" --include="*.js" --include="*.jsx" \
               --include="*.ts"  --include="*.tsx" \
               --exclude-dir=".git" . 2>/dev/null \
             | grep -v ".github/workflows/"; then
            echo "❌ Hardcoded secret detected"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"
