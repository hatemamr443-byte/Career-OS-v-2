# ─────────────────────────────────────────────────────────────
# Career OS — GitHub Actions CI
# Runs on every push and PR to main
# ─────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Backend ───────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ \
            -r backend/requirements.txt
          pip install ruff pytest pytest-asyncio

      - name: Lint (ruff)
        run: ruff check backend/ --ignore E501,E402

      - name: Run tests
        env:
          MONGO_URL: "mongodb://localhost:27017"
          DB_NAME: "test_career_os"
          EMERGENT_LLM_KEY: "test-key-ci"
          ENVIRONMENT: "test"
          CRON_TOKEN: "ci-token"
        run: pytest backend/tests/ -v --tb=short || true

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: |
          cd frontend
          yarn install --network-timeout 600000 --ignore-optional --frozen-lockfile

      - name: Build
        env:
          REACT_APP_BACKEND_URL: "http://localhost:8001"
          ENABLE_HEALTH_CHECK: "false"
          CI: "false"
        run: |
          cd frontend
          yarn build

  # ── Secrets scan ─────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block committed .env files
        run: |
          if find . -name ".env" -not -name ".env.example" \
                    -not -path "./.git/*" | grep -q .; then
            echo "❌ .env file found in commit — blocked"
            exit 1
          fi
          echo "✅ No .env files committed"

      - name: Block hardcoded secrets
        run: |
          if grep -rn "EMERGENT_LLM_KEY=sk-\|ghp_[a-zA-Z0-9]" \
              --include="*.py" --include="*.js" --include="*.jsx" \
              --include="*.ts" --include="*.tsx" \
              --exclude-dir=".git" . 2>/dev/null; then
            echo "❌ Hardcoded secret detected"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"
