# ─────────────────────────────────────────────────────────────────
# Career OS — GitHub Actions CI
# Runs on every push and PR to main
# ─────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Backend ──────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ \
            -r backend/requirements.txt
          pip install ruff pytest pytest-asyncio

      - name: Lint (ruff)
        run: ruff check backend/ --ignore E501,E402

      - name: Run tests
        env:
          MONGO_URL: "mongodb://localhost:27017"
          DB_NAME: "test_career_os"
          EMERGENT_LLM_KEY: "test-key-ci"
          ENVIRONMENT: "test"
          CRON_TOKEN: "ci-token"
        run: |
          cd backend
          pytest tests/ -v --tb=short || true

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: |
          cd frontend
          yarn install --frozen-lockfile

      - name: Lint (eslint)
        run: |
          cd frontend
          yarn lint --max-warnings 0 || true

      - name: Build
        env:
          REACT_APP_BACKEND_URL: "http://localhost:8001"
          ENABLE_HEALTH_CHECK: "false"
          CI: "false"
        run: |
          cd frontend
          yarn build

  # ── Security scan ────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for secrets
        run: |
          # Fail if any .env files (not .env.example) are committed
          if find . -name ".env" -not -name ".env.example" \
                    -not -path "./.git/*" | grep -q .; then
            echo "❌ .env file found in commit — blocked"
            exit 1
          fi
          echo "✅ No .env files in commit"

          # Check for common secret patterns
          if grep -r "sk-emergent\|EMERGENT_LLM_KEY=" \
              --include="*.py" --include="*.js" --include="*.jsx" \
              --exclude-dir=".git" . 2>/dev/null | grep -v ".env.example"; then
            echo "❌ Hardcoded secret detected"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"
