# Career OS — GitHub Actions CI
# Runs on every push and PR to main / develop
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Backend ───────────────────────────────────────────────────
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: career_os_test
      EMERGENT_LLM_KEY: test-key-ci
      ENVIRONMENT: test
      CRON_TOKEN: ci-token
      STRIPE_SECRET_KEY: sk_test_ci_placeholder_do_not_use
      ADMIN_TOKEN: ci-admin-token
      LOG_LEVEL: WARNING
      REACT_APP_BACKEND_URL: http://127.0.0.1:8001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install \
            --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ \
            -r backend/requirements.txt \
            ruff pytest pytest-asyncio pytest-cov bandit

      - name: Lint (ruff)
        run: ruff check backend --ignore E501

      - name: Security scan (bandit)
        run: |
          bandit -r backend \
            --exclude backend/tests \
            --severity-level medium \
            --confidence-level medium \
            -f txt || true
        continue-on-error: true

      - name: Start backend (background)
        working-directory: backend
        run: |
          python -m uvicorn server:app \
            --host 127.0.0.1 --port 8001 \
            --log-level warning &
          echo $! > /tmp/uvicorn.pid

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8001/health > /dev/null 2>&1; then
              echo "✅ Backend healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "❌ Backend failed to start in 60s"
          kill $(cat /tmp/uvicorn.pid) 2>/dev/null || true
          exit 1

      - name: Run tests with coverage
        env:
          PYTHONPATH: backend
        run: |
          pytest -vv backend/tests/backend_test.py \
            --tb=short -x \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junit-xml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            test-results.xml
            coverage.xml

      - name: Stop backend
        if: always()
        run: kill $(cat /tmp/uvicorn.pid) 2>/dev/null || true

  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20 / npm)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (ESLint)
        working-directory: frontend
        run: npx eslint src --max-warnings 50 || true
        continue-on-error: true

      - name: Security audit
        working-directory: frontend
        run: npm audit --audit-level=critical || true
        continue-on-error: true

      - name: Build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: http://127.0.0.1:8001
          ENABLE_HEALTH_CHECK: "false"
          CI: "false"
          NODE_OPTIONS: --openssl-legacy-provider
        run: npm run build

  # ── Secrets scan ─────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block committed .env files
        run: |
          if find . -name ".env" \
               -not -name ".env.example" \
               -not -path "./.git/*" \
             | grep -q .; then
            echo "❌ .env file committed — blocked"
            exit 1
          fi
          echo "✅ No .env files committed"

      - name: Block hardcoded secrets
        run: |
          if grep -rn \
               "EMERGENT_LLM_KEY=sk-\|ghp_[A-Za-z0-9]\|sk_live_[A-Za-z0-9]\|AKIA[A-Z0-9]" \
               --include="*.py" --include="*.js" --include="*.jsx" \
               --include="*.ts"  --include="*.tsx" \
               --exclude-dir=".git" . 2>/dev/null \
             | grep -v ".github/workflows/"; then
            echo "❌ Hardcoded secret detected"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

      - name: Check for exposed tokens in markdown/docs
        run: |
          if grep -rn "ghp_[A-Za-z0-9]\{36\}" \
               --include="*.md" \
               --exclude-dir=".git" . 2>/dev/null; then
            echo "❌ GitHub token found in documentation"
            exit 1
          fi
          echo "✅ No tokens in docs"
